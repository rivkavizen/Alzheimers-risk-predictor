<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assessment Results</title>
  <link rel="stylesheet" href="/css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <nav class="navbar">
    <a class="brand" href="/index.html">Alzheimer's Risk Predictor</a>
    <a href="/assessment.html">New Assessment</a>
    <a href="/trends.html">Trends</a>
    <a href="/settings.html">Settings</a>
  </nav>
  <main class="container">
    <h1>Assessment Results</h1>
    <div id="missing" class="alert warn" style="display:none">No assessment found. <a href="/assessment.html">Run one first</a>.</div>
    <div id="content" style="display:none">
      <div class="card">
        <div id="risk-badge" class="risk-badge"></div>
        <p id="risk-score" class="muted"></p>
      </div>
      <div class="card">
        <h2>Why this score? (SHAP)</h2>
        <div class="chart-wrap"><canvas id="shap-chart"></canvas></div>
      </div>
      <div class="card">
        <h2>Personalized recommendations</h2>
        <div id="recommendations"></div>
      </div>
      <div class="card" id="save-card">
        <h2>Save to database</h2>
        <div id="patient-save-fields" style="display:none">
          <label for="save-patient-name">Patient name</label>
          <input id="save-patient-name" type="text" placeholder="Jane Doe" />
        </div>
        <button id="save-btn">Save assessment</button>
        <a class="btn secondary" id="chat-btn" href="/chat.html" style="margin-left:0.5rem">Start chat</a>
      </div>
      <div id="status" style="margin-top:1rem"></div>
    </div>
  </main>
  <script type="module">
    import { createPatient, saveAssessment } from "/js/api.js";
    import { renderRecommendations, renderShapChart } from "/js/results.js";

    const raw = sessionStorage.getItem("lastAssessment");
    if (!raw) {
      document.getElementById("missing").style.display = "block";
    } else {
      const state = JSON.parse(raw);
      const { result } = state;
      document.getElementById("content").style.display = "block";

      const badge = document.getElementById("risk-badge");
      badge.textContent = `${result.risk_label} Risk`;
      badge.className = `risk-badge ${result.risk_label.toLowerCase()}`;
      document.getElementById("risk-score").textContent =
        `Risk score: ${(result.risk_score * 100).toFixed(1)}%`;

      try {
        renderShapChart(document.getElementById("shap-chart"), result.shap_explanation);
      } catch (err) {
        document.getElementById("status").innerHTML =
          `<div class="alert error">${err.message}</div>`;
      }
      renderRecommendations(document.getElementById("recommendations"), result.recommendations);

      const statusParts = [];
      if (result.ai_note) statusParts.push(`<div class="alert info">${result.ai_note}</div>`);
      if (result.ai_error) statusParts.push(`<div class="alert warn">${result.ai_error}</div>`);
      if (result.risk_analysis && !result.recommendations?.length) {
        statusParts.push(`<div class="alert info"><strong>AI analysis:</strong><br>${result.risk_analysis}</div>`);
      }
      if (statusParts.length) {
        document.getElementById("status").innerHTML = statusParts.join("");
      }

      if (!state.patientId) {
        document.getElementById("patient-save-fields").style.display = "block";
        if (state.patientName) {
          document.getElementById("save-patient-name").value = state.patientName;
        }
      }

      const chatBtn = document.getElementById("chat-btn");
      if (!state.assessmentId) {
        chatBtn.title = "Save the assessment first to enable chat";
        chatBtn.addEventListener("click", (e) => {
          if (!state.assessmentId) {
            e.preventDefault();
            document.getElementById("status").innerHTML =
              '<div class="alert warn">Save the assessment first, then start chat.</div>';
          }
        });
      }

      document.getElementById("save-btn").addEventListener("click", async () => {
        const status = document.getElementById("status");
        try {
          let patientId = state.patientId;
          if (!patientId) {
            const name = document.getElementById("save-patient-name").value.trim();
            if (!name) throw new Error("Enter a patient name to save.");
            const patient = await createPatient({ name });
            patientId = patient.id;
            state.patientId = patientId;
          }

          const saved = await saveAssessment({
            patient_id: patientId,
            ...result.features,
            risk_score: result.risk_score,
            risk_label: result.risk_label,
            shap_data: result.shap_explanation,
            recommendations: result.recommendations || [],
          });
          state.assessmentId = saved.id;
          sessionStorage.setItem("lastAssessment", JSON.stringify(state));
          document.getElementById("patient-save-fields").style.display = "none";
          status.innerHTML = '<div class="alert info">Assessment saved. You can now start chat.</div>';
        } catch (err) {
          status.innerHTML = `<div class="alert error">${err.message}</div>`;
        }
      });
    }
  </script>
</body>
</html>
