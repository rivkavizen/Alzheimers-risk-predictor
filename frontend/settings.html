<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <nav class="navbar">
    <a class="brand" href="/index.html">Alzheimer's Risk Predictor</a>
    <a href="/assessment.html">New Assessment</a>
    <a href="/trends.html">Trends</a>
    <a href="/settings.html">Settings</a>
  </nav>
  <main class="container">
    <h1>Settings</h1>
    <div class="card">
      <h2>Your Claude API key</h2>
      <p class="muted">Required for AI recommendations and chat. Stored in your browser only.</p>
      <p><a href="https://console.anthropic.com/" target="_blank" rel="noopener">Get a key from Anthropic Console</a></p>
      <label for="api-key">API key</label>
      <input id="api-key" type="password" placeholder="sk-ant-..." />
      <button id="save-key">Save key</button>
      <button id="clear-key" class="secondary" style="margin-left:0.5rem">Clear key</button>
      <div id="status" style="margin-top:1rem"></div>
    </div>
  </main>
  <script type="module">
    import { getApiKey, saveApiKey, clearApiKey } from "/js/settings.js";

    const input = document.getElementById("api-key");
    const status = document.getElementById("status");
    input.value = getApiKey();

    document.getElementById("save-key").addEventListener("click", () => {
      saveApiKey(input.value);
      status.innerHTML = '<div class="alert info">API key saved locally.</div>';
    });

    document.getElementById("clear-key").addEventListener("click", () => {
      clearApiKey();
      input.value = "";
      status.innerHTML = '<div class="alert info">API key cleared.</div>';
    });
  </script>
</body>
</html>
